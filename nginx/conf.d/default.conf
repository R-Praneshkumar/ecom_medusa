# ============================================
# Nginx - Site Config (HTTP only - initial setup)
# SSL gets added by deploy.sh via certbot
# ============================================

# Upstream servers
upstream medusa_backend {
    server medusa:9000;
}

upstream storefront {
    server storefront:8000;
}

# HTTP → HTTPS redirect (enabled after SSL setup)
# server {
#     listen 80;
#     server_name DOMAIN_PLACEHOLDER;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---------- Medusa Admin Dashboard ----------
    location /app {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Medusa API Routes ----------
    location /store {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hooks {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Health check ----------
    location /health {
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---------- Static assets (cached) ----------
    location /_next/static {
        proxy_pass http://storefront;
        proxy_cache static_cache;
        proxy_cache_valid 200 60m;
        add_header X-Cache-Status $upstream_cache_status;
        expires 30d;
    }

    # ---------- Storefront (everything else) ----------
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
